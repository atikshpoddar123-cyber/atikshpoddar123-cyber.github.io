<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Colony Strategy</title>
  <style>
    :root {
      --bg: #12202b;
      --panel: #1d2f3d;
      --panel-2: #273d4f;
      --text: #e8f1f8;
      --muted: #a9c0d1;
      --accent: #ffbf47;
      --good: #72e29a;
      --bad: #ff7d7d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      background: radial-gradient(circle at 20% 10%, #1f3648 0%, #0f1a23 70%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    #gameWrap {
      display: grid;
      grid-template-columns: auto 320px;
      gap: 12px;
      align-items: start;
      width: min(1240px, 100%);
    }

    #gameCanvas {
      border: 2px solid #375267;
      background: #21313f;
      image-rendering: pixelated;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      max-width: 100%;
      height: auto;
      touch-action: none;
    }

    #ui {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid #3a586f;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      max-height: 90vh;
      overflow: auto;
    }

    .card {
      border: 1px solid #3e6076;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      background: rgba(10, 20, 28, 0.2);
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px;
      color: #f7fafc;
    }

    h2 {
      font-size: 14px;
      margin: 0 0 6px;
      color: #cbe7ff;
      letter-spacing: 0.3px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
      font-size: 13px;
    }

    .muted {
      color: var(--muted);
    }

    button {
      width: 100%;
      margin: 4px 0;
      border: 1px solid #4f6f85;
      background: #325367;
      color: white;
      border-radius: 6px;
      padding: 6px 7px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #3c667f;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #log {
      height: 118px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.35;
      background: rgba(8, 15, 20, 0.45);
      border-radius: 6px;
      padding: 6px;
      border: 1px solid #365163;
    }

    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .accent { color: var(--accent); }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    @media (max-width: 1050px) {
      #gameWrap {
        grid-template-columns: 1fr;
      }
      #ui {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="ui">
      <h1>Colony Command</h1>

      <div class="card">
        <h2>Resources</h2>
        <div id="resourceStats" class="stats"></div>
      </div>

      <div class="card">
        <h2>Selected Tile</h2>
        <div id="selectedInfo" class="muted">Click a tile.</div>
      </div>

      <div class="card">
        <h2>Actions</h2>
        <button id="expandBtn">Expand / Capture Selected Tile (40 Materials, 20 Gold)</button>
        <div class="row">
          <button data-build="house">Build House</button>
          <button data-build="farm">Build Farm</button>
        </div>
        <div class="row">
          <button data-build="market">Build Market</button>
          <button data-build="outpost">Build Outpost</button>
        </div>
        <div class="row">
          <button data-build="wall">Build Wall</button>
          <button data-build="watchtower">Build Watch Tower</button>
        </div>
        <div class="row">
          <button data-build="fort">Build Fort</button>
          <button data-build="barracks">Build Barracks</button>
        </div>
        <button data-build="archery">Build Archery Range</button>
      </div>

      <div class="card">
        <h2>Units</h2>
        <button id="trainSoldier">Train Soldier (Barracks)</button>
        <button id="trainArcher">Train Archer (Archery Range)</button>
        <div class="muted" style="margin-top:6px; font-size:12px;">
          Click your unit to select it, then click a destination tile to move/attack.
        </div>
      </div>

      <div class="card">
        <h2>Quests</h2>
        <div id="questList" class="muted"></div>
      </div>

      <div class="card">
        <h2>Event Log</h2>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    // =====================
    // Game Config
    // =====================
    const GRID_W = 30;
    const GRID_H = 20;
    const TILE = 30;
    const PLAYER_ID = 0;

    const TERRAIN = {
      LAND: "land",
      RESOURCE: "resource",
      WATER: "water"
    };

    const OWNER_COLORS = {
      [-1]: null,
      0: "rgba(100, 220, 140, 0.35)",
      1: "rgba(230, 105, 90, 0.34)",
      2: "rgba(240, 185, 70, 0.34)"
    };

    const BUILDINGS = {
      house: {
        label: "House",
        short: "H",
        cost: { materials: 35, gold: 10 },
        effects: { housing: 6 }
      },
      farm: {
        label: "Farm",
        short: "F",
        cost: { materials: 30, gold: 8 },
        effects: { food: 4 }
      },
      market: {
        label: "Market",
        short: "M",
        cost: { materials: 45, gold: 15 },
        effects: { gold: 4, materials: 1 }
      },
      wall: {
        label: "Wall",
        short: "W",
        cost: { materials: 40, gold: 5 },
        effects: { defense: 2 }
      },
      watchtower: {
        label: "Watch Tower",
        short: "T",
        cost: { materials: 55, gold: 20 },
        effects: { defense: 3, safety: 2 }
      },
      fort: {
        label: "Fort",
        short: "Ft",
        cost: { materials: 70, gold: 35 },
        effects: { defense: 5, military: 3, safety: 2 }
      },
      barracks: {
        label: "Barracks",
        short: "B",
        cost: { materials: 60, gold: 20 },
        effects: {}
      },
      archery: {
        label: "Archery Range",
        short: "A",
        cost: { materials: 60, gold: 25 },
        effects: {}
      },
      outpost: {
        label: "Outpost",
        short: "O",
        cost: { materials: 55, gold: 18 },
        effects: { safety: 1 },
        influenceRadius: 2
      }
    };

    const UNIT_TYPES = {
      soldier: {
        label: "Soldier",
        hp: 18,
        atk: 4,
        range: 1,
        moveDelay: 0.45,
        cost: { food: 6, materials: 10, gold: 16 },
        barracks: true
      },
      archer: {
        label: "Archer",
        hp: 13,
        atk: 5,
        range: 2,
        moveDelay: 0.5,
        cost: { food: 7, materials: 12, gold: 18 },
        archery: true
      }
    };

    // =====================
    // Game State
    // =====================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const ui = {
      resourceStats: document.getElementById("resourceStats"),
      selectedInfo: document.getElementById("selectedInfo"),
      log: document.getElementById("log"),
      expandBtn: document.getElementById("expandBtn"),
      trainSoldier: document.getElementById("trainSoldier"),
      trainArcher: document.getElementById("trainArcher"),
      questList: document.getElementById("questList")
    };

    let nextUnitId = 1;

    const state = {
      map: [],
      units: [],
      selectedTile: null,
      selectedUnitId: null,
      lastFrame: performance.now(),
      economyTimer: 0,
      aiTimer: 0,
      towerTimer: 0,
      messageTimer: 0,
      gameOver: false,
      winnerText: "",
      tickCount: 0,
      factions: [
        createFaction(0, "Player", true),
        createFaction(1, "Crimson Pact", false),
        createFaction(2, "Dune Dominion", false)
      ],
      quests: createQuests()
    };

    function createFaction(id, name, isPlayer) {
      return {
        id,
        name,
        isPlayer,
        resources: {
          population: isPlayer ? 14 : 12,
          food: isPlayer ? 90 : 80,
          materials: isPlayer ? 120 : 110,
          gold: isPlayer ? 80 : 70,
          military: 0,
          morale: 100,
          housing: isPlayer ? 20 : 18
        },
        stats: {
          tilesCaptured: 0,
          farmsBuilt: 0,
          soldiersTrained: 0,
          expansionSuccess: 0
        }
      };
    }

    function createQuests() {
      return [
        {
          id: "capture5",
          title: "Capture 5 tiles",
          target: 5,
          reward: () => {
            const p = getFaction(PLAYER_ID);
            p.resources.materials += 70;
            p.resources.gold += 50;
            logMsg("Quest reward: +70 Materials, +50 Gold", "good");
          },
          done: false,
          progress: () => getFaction(PLAYER_ID).stats.tilesCaptured
        },
        {
          id: "farm3",
          title: "Build 3 farms",
          target: 3,
          reward: () => {
            const p = getFaction(PLAYER_ID);
            p.resources.population += 3;
            p.resources.housing += 2;
            p.resources.food += 30;
            logMsg("Quest reward: +3 Population, +30 Food", "good");
          },
          done: false,
          progress: () => getFaction(PLAYER_ID).stats.farmsBuilt
        },
        {
          id: "soldier5",
          title: "Train 5 soldiers",
          target: 5,
          reward: () => {
            const p = getFaction(PLAYER_ID);
            p.resources.materials += 50;
            p.resources.gold += 60;
            grantTerritoryBonus(PLAYER_ID, 2);
            logMsg("Quest reward: +50 Materials, +60 Gold, +2 bonus tiles", "good");
          },
          done: false,
          progress: () => getFaction(PLAYER_ID).stats.soldiersTrained
        }
      ];
    }

    function getFaction(id) {
      return state.factions.find(f => f.id === id);
    }

    function getTile(x, y) {
      if (x < 0 || y < 0 || x >= GRID_W || y >= GRID_H) return null;
      return state.map[y][x];
    }

    function makeTile(x, y, terrain) {
      return {
        x,
        y,
        terrain,
        owner: -1,
        building: null,
        hp: 0
      };
    }

    function initMap() {
      for (let y = 0; y < GRID_H; y++) {
        const row = [];
        for (let x = 0; x < GRID_W; x++) {
          const r = Math.random();
          let terrain = TERRAIN.LAND;
          if (r < 0.12) terrain = TERRAIN.WATER;
          else if (r < 0.23) terrain = TERRAIN.RESOURCE;
          row.push(makeTile(x, y, terrain));
        }
        state.map.push(row);
      }

      carveColony(4, Math.floor(GRID_H / 2), PLAYER_ID);
      carveColony(GRID_W - 5, 4, 1);
      carveColony(GRID_W - 6, GRID_H - 5, 2);

      const pc = { x: 4, y: Math.floor(GRID_H / 2) };
      placeBuilding(pc.x, pc.y, "outpost", PLAYER_ID, true);
      placeBuilding(pc.x + 1, pc.y, "barracks", PLAYER_ID, true);
      placeBuilding(pc.x, pc.y + 1, "farm", PLAYER_ID, true);

      const e1 = { x: GRID_W - 5, y: 4 };
      const e2 = { x: GRID_W - 6, y: GRID_H - 5 };
      placeBuilding(e1.x, e1.y, "outpost", 1, true);
      placeBuilding(e1.x - 1, e1.y, "barracks", 1, true);
      placeBuilding(e1.x, e1.y + 1, "farm", 1, true);

      placeBuilding(e2.x, e2.y, "outpost", 2, true);
      placeBuilding(e2.x - 1, e2.y, "archery", 2, true);
      placeBuilding(e2.x, e2.y - 1, "farm", 2, true);

      spawnUnit(PLAYER_ID, "soldier", pc.x + 1, pc.y + 1, true);
      spawnUnit(1, "soldier", e1.x - 1, e1.y + 1, true);
      spawnUnit(2, "archer", e2.x - 1, e2.y - 1, true);
    }

    function carveColony(cx, cy, owner) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const t = getTile(cx + dx, cy + dy);
          if (!t) continue;
          t.terrain = t.terrain === TERRAIN.WATER ? TERRAIN.LAND : t.terrain;
          t.owner = owner;
        }
      }
    }

    // =====================
    // Utility
    // =====================
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function randChoice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function manhattan(a, b) {
      return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
    }

    function neighbors4(x, y) {
      return [
        { x: x + 1, y },
        { x: x - 1, y },
        { x, y: y + 1 },
        { x, y: y - 1 }
      ].filter(p => p.x >= 0 && p.y >= 0 && p.x < GRID_W && p.y < GRID_H);
    }

    function hasResources(faction, cost) {
      const r = faction.resources;
      return Object.keys(cost).every(k => r[k] >= cost[k]);
    }

    function spendResources(faction, cost) {
      Object.keys(cost).forEach(k => {
        faction.resources[k] -= cost[k];
      });
    }

    function logMsg(msg, cls = "") {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = `[T${state.tickCount}] ${msg}`;
      ui.log.prepend(line);
      while (ui.log.children.length > 70) {
        ui.log.removeChild(ui.log.lastChild);
      }
    }

    // =====================
    // Territory / Building
    // =====================
    function outpostsForOwner(owner) {
      const arr = [];
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = state.map[y][x];
          if (t.owner === owner && t.building === "outpost") arr.push(t);
        }
      }
      return arr;
    }

    function canInfluence(owner, x, y) {
      const outposts = outpostsForOwner(owner);
      return outposts.some(op => {
        const radius = BUILDINGS.outpost.influenceRadius;
        return Math.abs(op.x - x) + Math.abs(op.y - y) <= radius;
      });
    }

    function hasAdjacentOwned(owner, x, y) {
      return neighbors4(x, y).some(n => getTile(n.x, n.y).owner === owner);
    }

    function canClaim(owner, x, y) {
      const t = getTile(x, y);
      if (!t || t.terrain === TERRAIN.WATER) return false;
      if (t.owner === owner) return false;
      if (hasAdjacentOwned(owner, x, y)) return true;
      if (canInfluence(owner, x, y)) return true;
      return false;
    }

    function captureTile(owner, x, y, byUnit = false) {
      const t = getTile(x, y);
      if (!t || t.terrain === TERRAIN.WATER) return false;
      if (t.owner === owner) return false;

      const previousOwner = t.owner;
      const attacker = getFaction(owner);

      if (t.building) {
        if (t.building === "outpost" || t.building === "fort") {
          t.hp -= byUnit ? 7 : 4;
          if (t.hp > 0) return false;
        }
        t.building = null;
      }

      t.owner = owner;
      t.hp = 0;

      if (owner === PLAYER_ID) {
        attacker.stats.tilesCaptured += 1;
        attacker.stats.expansionSuccess += 1;
      }

      if (previousOwner >= 0 && previousOwner !== owner) {
        const prevFaction = getFaction(previousOwner);
        prevFaction.resources.morale = clamp(prevFaction.resources.morale - 2, 25, 120);
      }
      return true;
    }

    function placeBuilding(x, y, type, owner, free = false) {
      const tile = getTile(x, y);
      if (!tile) return false;
      if (tile.owner !== owner || tile.terrain === TERRAIN.WATER || tile.building) return false;

      const faction = getFaction(owner);
      const def = BUILDINGS[type];
      if (!def) return false;

      if (!free) {
        if (!hasResources(faction, def.cost)) return false;
        spendResources(faction, def.cost);
      }

      tile.building = type;
      tile.hp = (type === "fort" ? 22 : type === "outpost" ? 18 : 12);

      if (type === "farm" && owner === PLAYER_ID) faction.stats.farmsBuilt += 1;
      return true;
    }

    // =====================
    // Units
    // =====================
    function getUnitById(id) {
      return state.units.find(u => u.id === id) || null;
    }

    function getUnitAt(x, y) {
      return state.units.find(u => u.x === x && u.y === y);
    }

    function spawnUnit(owner, type, x, y, free = false) {
      const faction = getFaction(owner);
      const def = UNIT_TYPES[type];
      if (!def) return false;
      if (!free) {
        if (!hasResources(faction, def.cost)) return false;
        spendResources(faction, def.cost);
      }

      const spawn = findSpawnNear(owner, x, y);
      if (!spawn) return false;

      const unit = {
        id: nextUnitId++,
        owner,
        type,
        x: spawn.x,
        y: spawn.y,
        hp: def.hp,
        maxHp: def.hp,
        atk: def.atk,
        range: def.range,
        moveDelay: def.moveDelay,
        moveCooldown: 0,
        attackCooldown: 0,
        target: null
      };

      state.units.push(unit);

      if (owner === PLAYER_ID && type === "soldier") {
        faction.stats.soldiersTrained += 1;
      }
      return true;
    }

    function findSpawnNear(owner, sx, sy) {
      const candidates = [{ x: sx, y: sy }, ...neighbors4(sx, sy)];
      for (const p of candidates) {
        const t = getTile(p.x, p.y);
        if (!t || t.owner !== owner || t.terrain === TERRAIN.WATER) continue;
        if (!getUnitAt(p.x, p.y)) return p;
      }
      return null;
    }

    function removeDeadUnits() {
      state.units = state.units.filter(u => u.hp > 0);
      if (state.selectedUnitId && !getUnitById(state.selectedUnitId)) {
        state.selectedUnitId = null;
      }
    }

    function resolveCombat(attacker, defender) {
      defender.hp -= attacker.atk;
      if (defender.hp > 0) {
        attacker.hp -= Math.max(1, Math.floor(defender.atk * 0.6));
      }
    }

    function chooseStep(unit, tx, ty) {
      const options = neighbors4(unit.x, unit.y)
        .filter(p => getTile(p.x, p.y).terrain !== TERRAIN.WATER)
        .filter(p => {
          const other = getUnitAt(p.x, p.y);
          return !other || other.owner !== unit.owner;
        });

      if (!options.length) return null;
      options.sort((a, b) => {
        const da = Math.abs(tx - a.x) + Math.abs(ty - a.y);
        const db = Math.abs(tx - b.x) + Math.abs(ty - b.y);
        return da - db;
      });
      return options[0];
    }

    function unitBehavior(dt) {
      for (const u of state.units) {
        u.moveCooldown = Math.max(0, u.moveCooldown - dt);
        u.attackCooldown = Math.max(0, u.attackCooldown - dt);
        if (!u.target) continue;

        const t = getTile(u.target.x, u.target.y);
        if (!t) {
          u.target = null;
          continue;
        }

        const dist = Math.abs(u.x - u.target.x) + Math.abs(u.y - u.target.y);

        if (dist <= u.range) {
          if (u.attackCooldown > 0) continue;

          const enemy = getUnitAt(u.target.x, u.target.y);
          if (enemy && enemy.owner !== u.owner) {
            resolveCombat(u, enemy);
            u.attackCooldown = 0.55;
          } else {
            if (captureTile(u.owner, u.target.x, u.target.y, true)) {
              if (u.owner === PLAYER_ID) logMsg("Tile captured by your unit", "accent");
            }
            u.attackCooldown = 0.65;
          }
          continue;
        }

        if (u.moveCooldown > 0) continue;

        const step = chooseStep(u, u.target.x, u.target.y);
        if (!step) {
          u.target = null;
          continue;
        }

        const blocker = getUnitAt(step.x, step.y);
        if (blocker && blocker.owner !== u.owner) {
          resolveCombat(u, blocker);
          u.attackCooldown = 0.6;
        } else {
          u.x = step.x;
          u.y = step.y;
          u.moveCooldown = u.moveDelay;
        }
      }

      removeDeadUnits();
    }

    // =====================
    // Economy + Civilians
    // =====================
    function evaluateFaction(id) {
      const faction = getFaction(id);
      const r = faction.resources;

      let territory = 0;
      let resourceTiles = 0;
      let perTick = {
        food: 1,
        materials: 1,
        gold: 1,
        housing: 0,
        military: 0,
        safety: 0,
        defense: 0
      };

      let danger = 0;

      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = state.map[y][x];
          if (t.owner !== id) continue;
          territory++;
          if (t.terrain === TERRAIN.RESOURCE) {
            resourceTiles++;
            perTick.materials += 1;
            perTick.gold += 0.5;
          }

          if (t.building) {
            const fx = BUILDINGS[t.building].effects;
            if (fx.food) perTick.food += fx.food;
            if (fx.materials) perTick.materials += fx.materials;
            if (fx.gold) perTick.gold += fx.gold;
            if (fx.housing) perTick.housing += fx.housing;
            if (fx.military) perTick.military += fx.military;
            if (fx.safety) perTick.safety += fx.safety;
            if (fx.defense) perTick.defense += fx.defense;
          }

          for (const n of neighbors4(x, y)) {
            const nt = getTile(n.x, n.y);
            if (nt.owner >= 0 && nt.owner !== id) danger += 0.3;
          }
        }
      }

      const militaryFromUnits = state.units
        .filter(u => u.owner === id)
        .reduce((sum, u) => sum + (u.type === "archer" ? 2.5 : 2), 0);

      r.food += perTick.food;
      r.materials += perTick.materials + territory * 0.15;
      r.gold += perTick.gold + territory * 0.08;
      r.housing = 10 + perTick.housing;
      r.military = Math.floor(perTick.military + militaryFromUnits + perTick.defense * 0.5);

      const foodUse = r.population * 0.35;
      r.food -= foodUse;

      if (r.food > r.population * 0.9 && r.population < r.housing) {
        const growth = 0.22 * (r.morale / 100);
        r.population += growth;
      } else if (r.food < r.population * 0.45) {
        r.population -= 0.16;
        r.morale -= 3;
      }

      if (danger > 2) r.morale -= 2;
      else r.morale += 0.8;

      const expansionBonus = Math.min(8, faction.stats.expansionSuccess * 0.2);
      r.morale += expansionBonus * 0.08;

      r.population = clamp(r.population, 5, r.housing + 8);
      r.food = clamp(r.food, -40, 9999);
      r.materials = clamp(r.materials, 0, 9999);
      r.gold = clamp(r.gold, 0, 9999);
      r.morale = clamp(r.morale, 25, 125);

      if (id === PLAYER_ID && r.food < 0 && state.tickCount % 6 === 0) {
        logMsg("Food shortage! Build farms or markets.", "bad");
      }

      return { territory, resourceTiles, danger };
    }

    function globalEconomyTick() {
      state.tickCount += 1;

      const results = {};
      for (const f of state.factions) {
        results[f.id] = evaluateFaction(f.id);
      }

      runQuests();
      checkVictory(results);
    }

    function runQuests() {
      for (const q of state.quests) {
        if (q.done) continue;
        if (q.progress() >= q.target) {
          q.done = true;
          q.reward();
          logMsg(`Quest complete: ${q.title}`, "good");
        }
      }
    }

    function checkVictory(results) {
      const playerTiles = results[PLAYER_ID].territory;
      const totalLand = GRID_W * GRID_H;
      const enemiesAlive = state.factions
        .filter(f => !f.isPlayer)
        .some(f => results[f.id].territory > 0);

      if (playerTiles <= 0) {
        state.gameOver = true;
        state.winnerText = "Defeat - your colony has fallen.";
      } else if (!enemiesAlive || playerTiles > totalLand * 0.45) {
        state.gameOver = true;
        state.winnerText = "Victory - your colony dominates the region!";
      }
    }

    function grantTerritoryBonus(owner, count) {
      const candidates = [];
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = getTile(x, y);
          if (t.owner === owner) continue;
          if (t.terrain === TERRAIN.WATER) continue;
          if (canClaim(owner, x, y)) candidates.push(t);
        }
      }
      for (let i = 0; i < count; i++) {
        if (!candidates.length) break;
        const idx = Math.floor(Math.random() * candidates.length);
        const tile = candidates.splice(idx, 1)[0];
        captureTile(owner, tile.x, tile.y, false);
      }
    }

    // =====================
    // AI Behavior
    // =====================
    function aiTick() {
      for (const faction of state.factions) {
        if (faction.isPlayer) continue;

        aiExpand(faction);
        aiBuild(faction);
        aiTrain(faction);
        aiControlUnits(faction);
      }
    }

    function aiExpand(faction) {
      const options = [];
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = getTile(x, y);
          if (t.terrain === TERRAIN.WATER) continue;
          if (t.owner === faction.id) continue;
          if (canClaim(faction.id, x, y)) options.push(t);
        }
      }

      if (!options.length) return;
      if (Math.random() > 0.7) return;

      const cost = { materials: 35, gold: 16 };
      if (!hasResources(faction, cost)) return;

      const target = randChoice(options);
      spendResources(faction, cost);
      captureTile(faction.id, target.x, target.y, false);
    }

    function aiBuild(faction) {
      if (Math.random() > 0.55) return;

      const ownedEmpty = [];
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = getTile(x, y);
          if (t.owner === faction.id && !t.building && t.terrain !== TERRAIN.WATER) ownedEmpty.push(t);
        }
      }
      if (!ownedEmpty.length) return;

      const choices = ["farm", "house", "market", "wall", "watchtower", "fort", "outpost", "barracks", "archery"];
      const pick = randChoice(choices);
      const tile = randChoice(ownedEmpty);
      placeBuilding(tile.x, tile.y, pick, faction.id, false);
    }

    function aiTrain(faction) {
      if (Math.random() > 0.65) return;

      const buildings = findBuildings(faction.id);
      if (buildings.barracks.length && Math.random() < 0.62) {
        const b = randChoice(buildings.barracks);
        spawnUnit(faction.id, "soldier", b.x, b.y, false);
      }
      if (buildings.archery.length && Math.random() < 0.5) {
        const a = randChoice(buildings.archery);
        spawnUnit(faction.id, "archer", a.x, a.y, false);
      }
    }

    function aiControlUnits(faction) {
      const enemyTargets = [];
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = getTile(x, y);
          if (t.owner !== faction.id && t.terrain !== TERRAIN.WATER) enemyTargets.push(t);
        }
      }
      if (!enemyTargets.length) return;

      const shouldAttackPlayer = Math.random() < 0.48;
      const preferred = shouldAttackPlayer
        ? enemyTargets.filter(t => t.owner === PLAYER_ID)
        : enemyTargets;
      const pool = preferred.length ? preferred : enemyTargets;

      for (const unit of state.units) {
        if (unit.owner !== faction.id) continue;
        if (unit.target && Math.random() < 0.7) continue;

        const target = pickNearest(unit, pool);
        if (target) unit.target = { x: target.x, y: target.y };
      }
    }

    function findBuildings(owner) {
      const result = { barracks: [], archery: [], outpost: [] };
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = getTile(x, y);
          if (t.owner !== owner || !t.building) continue;
          if (t.building === "barracks") result.barracks.push(t);
          if (t.building === "archery") result.archery.push(t);
          if (t.building === "outpost") result.outpost.push(t);
        }
      }
      return result;
    }

    function pickNearest(unit, tiles) {
      let best = null;
      let bestD = Infinity;
      for (const t of tiles) {
        const d = Math.abs(unit.x - t.x) + Math.abs(unit.y - t.y);
        if (d < bestD) {
          bestD = d;
          best = t;
        }
      }
      return best;
    }

    // =====================
    // Defensive Towers
    // =====================
    function towerTick() {
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = getTile(x, y);
          if (!t.building || (t.building !== "watchtower" && t.building !== "fort")) continue;

          const range = t.building === "fort" ? 2 : 1;
          const enemies = state.units.filter(u => {
            if (u.owner === t.owner) return false;
            return Math.abs(u.x - x) + Math.abs(u.y - y) <= range;
          });

          if (enemies.length) {
            const target = enemies[0];
            target.hp -= t.building === "fort" ? 3 : 2;
            if (t.owner === PLAYER_ID) {
              logMsg(`${BUILDINGS[t.building].label} fired at enemy`, "accent");
            }
          }
        }
      }
      removeDeadUnits();
    }

    // =====================
    // Input Handling
    // =====================
    canvas.addEventListener("click", onCanvasClick);

    function onCanvasClick(e) {
      if (state.gameOver) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = Math.floor((e.clientX - rect.left) * scaleX / TILE);
      const y = Math.floor((e.clientY - rect.top) * scaleY / TILE);
      const tile = getTile(x, y);
      if (!tile) return;

      state.selectedTile = { x, y };
      const clickedUnit = getUnitAt(x, y);

      if (clickedUnit && clickedUnit.owner === PLAYER_ID) {
        state.selectedUnitId = clickedUnit.id;
        logMsg(`Selected ${UNIT_TYPES[clickedUnit.type].label} #${clickedUnit.id}`);
      } else if (state.selectedUnitId) {
        const u = getUnitById(state.selectedUnitId);
        if (u) {
          u.target = { x, y };
          logMsg(`Unit #${u.id} moving to (${x}, ${y})`);
        }
      }

      updateUI();
    }

    ui.expandBtn.addEventListener("click", () => {
      if (!state.selectedTile) return;
      const p = getFaction(PLAYER_ID);
      const x = state.selectedTile.x;
      const y = state.selectedTile.y;
      const cost = { materials: 40, gold: 20 };

      if (!canClaim(PLAYER_ID, x, y)) {
        logMsg("Cannot capture: needs adjacency or outpost influence.", "bad");
        return;
      }
      if (!hasResources(p, cost)) {
        logMsg("Not enough resources to expand.", "bad");
        return;
      }

      spendResources(p, cost);
      if (captureTile(PLAYER_ID, x, y, false)) {
        logMsg(`Captured tile (${x}, ${y})`, "good");
      } else {
        logMsg("Capture attempt damaged defenses.", "accent");
      }

      updateUI();
    });

    document.querySelectorAll("button[data-build]").forEach(btn => {
      btn.addEventListener("click", () => {
        const type = btn.dataset.build;
        if (!state.selectedTile) {
          logMsg("Select one of your tiles first.", "bad");
          return;
        }

        const { x, y } = state.selectedTile;
        const t = getTile(x, y);
        if (t.owner !== PLAYER_ID) {
          logMsg("You can only build on your territory.", "bad");
          return;
        }

        const ok = placeBuilding(x, y, type, PLAYER_ID, false);
        if (ok) {
          logMsg(`Built ${BUILDINGS[type].label} at (${x}, ${y})`, "good");
        } else {
          logMsg(`Cannot build ${BUILDINGS[type].label} here.`, "bad");
        }
        updateUI();
      });
    });

    ui.trainSoldier.addEventListener("click", () => {
      trainPlayerUnit("soldier");
    });

    ui.trainArcher.addEventListener("click", () => {
      trainPlayerUnit("archer");
    });

    function trainPlayerUnit(type) {
      if (!state.selectedTile) {
        logMsg("Select a tile with a military building.", "bad");
        return;
      }

      const tile = getTile(state.selectedTile.x, state.selectedTile.y);
      if (tile.owner !== PLAYER_ID) {
        logMsg("Selected tile is not yours.", "bad");
        return;
      }

      const req = type === "soldier" ? "barracks" : "archery";
      if (tile.building !== req) {
        logMsg(`${UNIT_TYPES[type].label} must be trained on a ${BUILDINGS[req].label}.`, "bad");
        return;
      }

      const ok = spawnUnit(PLAYER_ID, type, tile.x, tile.y, false);
      if (ok) {
        logMsg(`Trained ${UNIT_TYPES[type].label}`, "good");
      } else {
        logMsg(`Cannot train ${UNIT_TYPES[type].label} (cost/space).`, "bad");
      }
      updateUI();
    }

    // =====================
    // Rendering
    // =====================
    function drawMap() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const t = state.map[y][x];
          const px = x * TILE;
          const py = y * TILE;

          if (t.terrain === TERRAIN.LAND) ctx.fillStyle = "#4f8458";
          if (t.terrain === TERRAIN.RESOURCE) ctx.fillStyle = "#7a8e4d";
          if (t.terrain === TERRAIN.WATER) ctx.fillStyle = "#2f5f8c";
          ctx.fillRect(px, py, TILE, TILE);

          if (t.owner >= 0) {
            ctx.fillStyle = OWNER_COLORS[t.owner];
            ctx.fillRect(px, py, TILE, TILE);
          }

          if (t.building) {
            ctx.fillStyle = "#1f1f1f";
            ctx.fillRect(px + 6, py + 6, TILE - 12, TILE - 12);
            ctx.fillStyle = "#f4f4f4";
            ctx.font = "10px Verdana";
            ctx.textAlign = "center";
            ctx.fillText(BUILDINGS[t.building].short, px + TILE / 2, py + TILE / 2 + 3);
          }

          if (t.terrain === TERRAIN.RESOURCE) {
            ctx.fillStyle = "rgba(255, 225, 92, 0.7)";
            ctx.fillRect(px + TILE - 8, py + 2, 6, 6);
          }

          ctx.strokeStyle = "rgba(12, 22, 28, 0.32)";
          ctx.strokeRect(px, py, TILE, TILE);
        }
      }
    }

    function drawUnits() {
      for (const u of state.units) {
        const px = u.x * TILE + TILE / 2;
        const py = u.y * TILE + TILE / 2;

        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fillStyle = u.owner === PLAYER_ID ? "#d6ffe6" : (u.owner === 1 ? "#ffd0cc" : "#ffe7c1");
        ctx.fill();
        ctx.strokeStyle = "#1f2f3a";
        ctx.stroke();

        ctx.fillStyle = "#152430";
        ctx.font = "10px Verdana";
        ctx.textAlign = "center";
        ctx.fillText(u.type === "soldier" ? "S" : "A", px, py + 3);

        // HP bar
        const hpRatio = u.hp / u.maxHp;
        ctx.fillStyle = "#2b1c1c";
        ctx.fillRect(px - 10, py - 13, 20, 3);
        ctx.fillStyle = hpRatio > 0.5 ? "#6af08a" : hpRatio > 0.25 ? "#ffd36a" : "#ff7c7c";
        ctx.fillRect(px - 10, py - 13, 20 * hpRatio, 3);
      }
    }

    function drawSelection() {
      if (state.selectedTile) {
        const { x, y } = state.selectedTile;
        ctx.strokeStyle = "#fff5a8";
        ctx.lineWidth = 2;
        ctx.strokeRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
        ctx.lineWidth = 1;
      }

      const selectedUnit = getUnitById(state.selectedUnitId);
      if (selectedUnit) {
        ctx.strokeStyle = "#ffe36f";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(selectedUnit.x * TILE + TILE / 2, selectedUnit.y * TILE + TILE / 2, 11, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;

        if (selectedUnit.target) {
          ctx.strokeStyle = "#ffd8a6";
          ctx.beginPath();
          ctx.moveTo(selectedUnit.x * TILE + TILE / 2, selectedUnit.y * TILE + TILE / 2);
          ctx.lineTo(selectedUnit.target.x * TILE + TILE / 2, selectedUnit.target.y * TILE + TILE / 2);
          ctx.stroke();
        }
      }
    }

    function drawHeader() {
      if (!state.gameOver) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 34px Verdana";
      ctx.textAlign = "center";
      ctx.fillText(state.winnerText, canvas.width / 2, canvas.height / 2);
      ctx.font = "16px Verdana";
      ctx.fillText("Refresh the page to play again.", canvas.width / 2, canvas.height / 2 + 30);
    }

    function render() {
      drawMap();
      drawUnits();
      drawSelection();
      drawHeader();
    }

    // =====================
    // UI Updates
    // =====================
    function countTerritory(owner) {
      let n = 0;
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          if (getTile(x, y).owner === owner) n++;
        }
      }
      return n;
    }

    function updateUI() {
      const p = getFaction(PLAYER_ID);
      const territory = countTerritory(PLAYER_ID);
      const units = state.units.filter(u => u.owner === PLAYER_ID).length;

      ui.resourceStats.innerHTML = `
        <div>Population:</div><div>${p.resources.population.toFixed(1)} / ${p.resources.housing.toFixed(0)}</div>
        <div>Food:</div><div>${p.resources.food.toFixed(1)}</div>
        <div>Materials:</div><div>${p.resources.materials.toFixed(1)}</div>
        <div>Gold:</div><div>${p.resources.gold.toFixed(1)}</div>
        <div>Military:</div><div>${p.resources.military}</div>
        <div>Morale:</div><div>${p.resources.morale.toFixed(0)}</div>
        <div>Territory:</div><div>${territory} tiles</div>
        <div>Units:</div><div>${units}</div>
      `;

      if (state.selectedTile) {
        const { x, y } = state.selectedTile;
        const t = getTile(x, y);
        const ownerName = t.owner === -1 ? "Neutral" : getFaction(t.owner).name;
        const u = getUnitAt(x, y);
        ui.selectedInfo.innerHTML = `
          Tile: (${x}, ${y})<br/>
          Terrain: ${t.terrain}<br/>
          Owner: ${ownerName}<br/>
          Building: ${t.building ? BUILDINGS[t.building].label : "None"}<br/>
          Unit: ${u ? `${getFaction(u.owner).name} ${UNIT_TYPES[u.type].label} (HP ${u.hp.toFixed(0)})` : "None"}
        `;
      } else {
        ui.selectedInfo.textContent = "Click a tile.";
      }

      const questHtml = state.quests.map(q => {
        const prog = Math.min(q.progress(), q.target);
        const done = q.done ? "<span class='good'>Completed</span>" : `${prog} / ${q.target}`;
        return `<div style="margin-bottom:6px;">${q.title}: ${done}</div>`;
      }).join("");
      ui.questList.innerHTML = questHtml;

      // Disable train buttons if no corresponding building selected.
      if (state.selectedTile) {
        const t = getTile(state.selectedTile.x, state.selectedTile.y);
        ui.trainSoldier.disabled = !(t.owner === PLAYER_ID && t.building === "barracks");
        ui.trainArcher.disabled = !(t.owner === PLAYER_ID && t.building === "archery");
      } else {
        ui.trainSoldier.disabled = true;
        ui.trainArcher.disabled = true;
      }
    }

    // =====================
    // Main Loop
    // =====================
    function gameLoop(now) {
      const dt = Math.min(0.05, (now - state.lastFrame) / 1000);
      state.lastFrame = now;

      if (!state.gameOver) {
        state.economyTimer += dt;
        state.aiTimer += dt;
        state.towerTimer += dt;

        unitBehavior(dt);

        if (state.economyTimer >= 1.0) {
          globalEconomyTick();
          state.economyTimer -= 1.0;
          updateUI();
        }

        if (state.aiTimer >= 1.15) {
          aiTick();
          state.aiTimer -= 1.15;
        }

        if (state.towerTimer >= 1.25) {
          towerTick();
          state.towerTimer -= 1.25;
        }
      }

      render();
      requestAnimationFrame(gameLoop);
    }

    // =====================
    // Boot
    // =====================
    function init() {
      initMap();
      logMsg("Colony established. Expand and defeat enemy factions.", "accent");
      updateUI();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
</html>
